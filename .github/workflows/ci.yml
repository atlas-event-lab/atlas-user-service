name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write          # push to GHCR via GITHUB_TOKEN (no long-lived creds)

jobs:
  test:
    name: Unit tests (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle      # reuse Gradle deps cache across runs
      - run: chmod +x ./gradlew
      - name: Test
        run: ./gradlew --no-daemon test

  image:
    name: Build & push image
    needs: test              # only runs if tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}   # ghcr.io/<org>/atlas-<service>
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha          # reuse the dependency layer across runs
          cache-to: type=gha,mode=max
