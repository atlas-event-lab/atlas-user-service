name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Unit tests (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: gradle }
      - run: chmod +x ./gradlew
      - run: ./gradlew --no-daemon spotlessCheck checkstyleMain test

  image:
    name: Build & push image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy (helm upgrade)
    needs: image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps chart + values
        uses: actions/checkout@v4
        with:
          repository: atlas-event-lab/atlas-gitops
          path: gitops
      - uses: azure/setup-helm@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
      - name: Helm upgrade with the immutable image tag
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          NAME="${REPO#atlas-}"
          VALUES="${NAME%-service}"
          helm upgrade --install "$NAME" gitops/charts/atlas-service \
            -f "gitops/charts/atlas-service/values/${VALUES}.yaml" -n atlas-apps \
            --set image.tag="sha-${GITHUB_SHA}" \
            --wait --timeout 5m
