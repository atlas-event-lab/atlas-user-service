server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html

spring:
  application:
    name: user-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/user_db}
    username: ${DB_USERNAME:atlas}
    password: ${DB_PASSWORD:CAMBIAR_PASSWORD}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/atlas}

management:
  server:
    port: 9090
  tracing:
    baggage:
      remote-fields:
        - correlationId
      correlation:
        fields:
          - correlationId
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://tempo.atlas-observability:4318/v1/traces}
  metrics:
    distribution:
      # Native Prometheus histogram buckets for HTTP server timings, so Grafana can compute
      # p95/p99 and draw per-endpoint latency heatmaps (RED / APM). Roadmap Phase 6/7.
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,300ms,500ms,1s,2s,5s
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

logging:
  level:
    com.atlas: INFO
    org.springframework.security: WARN
